<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- form for submit -->
    <form action="myserver.com" method="POST"> <input type="submit" value="Submit" /></form><br><br>

    <!-- text -->
    <label for="fname">First name:</label> <input type="text" id="fname" name="fname"><br>
    
    <!-- password -->
    <label for="pwd">Password:</label> <input type="password" id="pwd" name="pwd"><br>

    <!-- (date and time) -->
    <label for="dateandtime">pick date and time:</label> <input type="datetime-local" id="dt" name="dt"><br>

    <!-- Email -->
    <label for="email">Enter your email:</label> <input type="email" id="email" name="email"><br>

    <!-- File -->
    <label for="myfile">Select a file:</label> <input type="file" id="myfile" name="myfile"><br><br>

    <!-- Hidden -->
    <input type="hidden" id="custId" name="custId" value="3487">

    <!-- Number -->
    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" name="quantity" min="1" max="5"><br>

    <!-- Range -->
    <label for="volume">Volume:</label>
    <input type="range" id="volume" name="volume" min="0" max="10"><br>

    <!-- Reset -->
    <input type="reset" value="Reset"><br>

    <!-- Search -->
    <label for="gsearch">Search in Google:</label>
    <input type="search" id="gsearch" name="gsearch"><br>

    <!-- Time -->
    <label for="appt">Select a time:</label>
    <input type="time" id="appt" name="appt"><br>

    <!-- Tel -->
    <label for="phone">Enter your phone number:</label>
    <input type="tel" id="phone" name="phone" pattern="[+]{1}[0-9]{11,14}"><br>

    <!-- URL -->
    <label for="homepage">Add your homepage:</label>
    <input type="url" id="homepage" name="homepage"><br>
    </form>

</body>
</html>
