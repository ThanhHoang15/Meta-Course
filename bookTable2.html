<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
    <img src="logo.png">
    </header>
  <main>
    <form method="POST">
        <div>
            <label for="booking_date">Booking Date</label>
            <input type="date" id="booking_date" name="booking date">
        </div>
        <div>
            <label for="people">Number Of People</label>
            <input type="range" name="people" id="people" min="1" max="10" value="4" 
            oninput="this.nextElementSibling.value = this.value">
            <output>4</output>
        </div>
        <div>
            <label for="location1">Location option 1</label>
            <input list="locationOption1" id="location1" name="location1">
            <datalist id="locationOption1">
                <option value="uptown">
                <option value="downtown">    
            </datalist>
        </div>
        <div>
            <label for="location2">Location option 2</label>
            <select name="" id="">
                <option value="Uptown"> uptown</option>
                <option value="Downtown">downtown</option>
            </select>

           
        </div>
        <textarea name="response" rows="10" cols="30" maxlength=”200”> 
        </textarea>
        <div>
            <button type="submit">Book table</button>
        </div>
    </form>
  </main>
</body>
</html>
